name: docs-agent
description: "Documentation assistant with MCP-powered context search"

model: gpt-4o

system_prompt: |
  You are a documentation assistant. Use the available MCP tools to:
  1. Resolve library IDs for packages the user asks about
  2. Query documentation for specific topics
  3. Provide clear, actionable answers with code examples

  Always search for up-to-date docs rather than relying on training data.

tools:
  core:
    read_file: {}
    write_file: {}
    list_dir: {}
    grep: {}

mcp:
  servers:
    - name: context7
      transport: http
      url: https://mcp.context7.com/mcp
      headers:
        CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}

    - name: tanstack
      transport: stdio
      command: ["npx", "@tanstack/cli", "mcp"]

max_turns: 10
timeout_seconds: 120

output:
  stream: true
  format: text
