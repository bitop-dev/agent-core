# MCP agent — connects to external tool servers via Model Context Protocol.
# Demonstrates both HTTP/SSE and stdio MCP transports.
#
# MCP lets you connect to external tool servers that expose tools via JSON-RPC.
# The agent discovers available tools at startup and can call them like any other tool.
#
# Usage:
#   export CONTEXT7_API_KEY=...
#   agent-core run -c examples/mcp-agent.yaml \
#     --mission "Look up the React useEffect documentation"

name: docs-agent
description: "Documentation assistant with MCP-powered context search"

model: gpt-4o

system_prompt: |
  You are a documentation assistant. Use the available MCP tools to:
  1. Resolve library IDs for packages the user asks about
  2. Query documentation for specific topics
  3. Provide clear, actionable answers with code examples

  Always search for up-to-date docs rather than relying on training data.

tools:
  core:
    read_file: {}
    write_file: {}
    list_dir: {}
    grep: {}

mcp:
  servers:
    # HTTP/SSE transport — connect to a running MCP server
    - name: context7
      transport: http
      url: https://mcp.context7.com/mcp
      headers:
        CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}

    # stdio transport — spawns the MCP server as a child process
    - name: tanstack
      transport: stdio
      command: ["npx", "@tanstack/cli", "mcp"]

max_turns: 10
timeout_seconds: 120

output:
  stream: true
  format: text
