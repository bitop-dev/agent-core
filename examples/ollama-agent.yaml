# Local Ollama agent — runs entirely offline with no API keys.
# Uses a local LLM via Ollama with native tools only.
#
# Prerequisites:
#   1. Install Ollama: https://ollama.ai
#   2. Start server: ollama serve
#   3. Pull a model: ollama pull llama3.1
#
# Usage:
#   agent-core run -c examples/ollama-agent.yaml \
#     --mission "List the files in the current directory and summarize what this project does"
#
# Or interactive:
#   agent-core chat -c examples/ollama-agent.yaml

name: local-agent
description: "Coding assistant using a local Ollama model — fully offline"

provider: ollama
model: llama3.1

system_prompt: |
  You are a helpful coding assistant running locally via Ollama.
  Help the user with coding tasks, reading and editing files,
  and running commands.

tools:
  core:
    bash:
      timeout_seconds: 30
    read_file: {}
    write_file: {}
    edit_file: {}
    list_dir: {}
    grep: {}

max_turns: 20
timeout_seconds: 300

# No API key needed — Ollama runs locally
# No sandbox needed — native tools only

output:
  stream: true
  format: text
